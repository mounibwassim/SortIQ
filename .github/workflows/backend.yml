name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate mock model
      working-directory: ./backend
      run: |
        python create_mock_model.py

    - name: Verify app imports
      working-directory: ./backend
      run: |
        python -c "from fastapi import FastAPI; print('FastAPI OK')"
        python -c "from database import Base, engine; Base.metadata.create_all(bind=engine); print('Database OK')"
        python -c "from schemas import RealtimePredictResponse; print('Schemas OK')"
        echo "All imports verified"

    - name: Run tests
      working-directory: ./backend
      continue-on-error: true
      run: |
        pytest tests/ -v --tb=short
