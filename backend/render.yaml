services:
  - type: web
    name: sortiq-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: TF_USE_LEGACY_KERAS
        value: "1"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MALLOC_TRIM_THRESHOLD_
        value: "65536"
